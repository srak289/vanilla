general {
    grace = 0                 # No delay before locking
    hide_cursor = true        # Hide cursor when idle
    no_fade_in = true         # Instant appearance like swaylock
    ignore_empty_input = true
}

background {
    monitor =
    path = "/home/srak/Pictures/Wallpaper/serenity.jpg"
    #blur_passes = 3
    #blur_size = 5
}

# --- Time (Centered at top) ---
label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgba(255, 255, 255, 0.8)
    font_size = 64
    font_family = sans-serif
    position = 0, 150         # Above the password box
    halign = center
    valign = center
}

# --- Date (Centered below Time) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(255, 255, 255, 0.6)
    font_size = 24
    font_family = sans-serif
    position = 0, 90          # Below Time
    halign = center
    valign = center
}

# --- Swaylock Circular Indicator with Keypress Flashing ---
input-field {
    monitor =
    size = 120, 120           # Square dimensions
    rounding = -1             # Forces a perfect swaylock circle
    outline_thickness = 10     # The static thickness of the ring
    
    fade_on_empty = false
    placeholder_text =        # Hollow center requires an empty placeholder
    hide_input = true

    # Base Idle State (Transparent Center + Muted Ring)
    hide_input_base_colot = rgba(40, 42, 54)
    outer_color = rgba(40, 42, 54, 0.7)   # Classic deep charcoal ring
    inner_color = rgba(0, 0, 0, 0.0)      # Keeps the circle hollow when idle
    font_color = rgba(248, 248, 242, 1.0) # Matches white/cream text color

    # --- THE KEYPRESS FLASH MECHANISM ---
    # Replicates swaylock-effects by filling the center upon interaction
    bothlock_color = rgba(189, 147, 249, 0.4) # Flashes a purple hue if Caps+Num lock are on
    capslock_color = rgba(255, 184, 108, 0.6) # Flashes warning orange if Caps Lock is active
    invert_numlock = false                    # Keeps behavior standard

    # Ring Feedback Animations
    check_color = rgba(98, 114, 164, 1.0)     # Ring changes to blue during validation
    fail_color = rgba(255, 85, 85, 1.0)       # Ring changes to sharp red on rejection
    fail_text = ⛔
    fail_transition = 200

    position = 0, -60
    halign = center
    valign = center
}

